<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack Surface Report — {{target}}</title>
    <style>
        /* ── Variables ── */
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0d1117;
            --bg-card: #161b22;
            --border: #21262d;
            --text-primary: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #00ff41;
            --critical: #ff4444;
            --high: #ff8800;
            --medium: #ffcc00;
            --low: #4488ff;
            --info: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ── Layout ── */
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* ── Header ── */
        .header {
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 2rem; color: var(--accent-blue); margin-bottom: 8px; }
        .header .meta { color: var(--text-muted); font-size: 0.9rem; }
        .header .target { color: var(--accent-green); font-weight: bold; }

        /* ── Risk Badge ── */
        .risk-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            margin-left: 12px;
        }
        .risk-critical { background: #ff1a1a33; color: var(--critical); border: 1px solid var(--critical); }
        .risk-high     { background: #ff880033; color: var(--high);     border: 1px solid var(--high); }
        .risk-medium   { background: #ffcc0033; color: var(--medium);   border: 1px solid var(--medium); }
        .risk-low      { background: #4488ff33; color: var(--low);      border: 1px solid var(--low); }

        /* ── Section ── */
        .section { margin-bottom: 40px; }
        .section h2 {
            font-size: 1.4rem;
            color: var(--accent-blue);
            border-left: 4px solid var(--accent-blue);
            padding-left: 12px;
            margin-bottom: 16px;
        }
        .section h3 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin: 16px 0 8px;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        .stat-critical { color: var(--critical); }
        .stat-high     { color: var(--high); }
        .stat-medium   { color: var(--medium); }
        .stat-low      { color: var(--low); }
        .stat-info     { color: var(--info); }

        /* ── Finding Cards ── */
        .finding {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--info);
        }
        .finding-Critical { border-left-color: var(--critical); }
        .finding-High     { border-left-color: var(--high); }
        .finding-Medium   { border-left-color: var(--medium); }
        .finding-Low      { border-left-color: var(--low); }

        .finding .title    { font-weight: bold; font-size: 1rem; }
        .finding .severity { font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; float: right; }
        .sev-Critical { background: #ff1a1a33; color: var(--critical); }
        .sev-High     { background: #ff880033; color: var(--high); }
        .sev-Medium   { background: #ffcc0033; color: var(--medium); }
        .sev-Low      { background: #4488ff33; color: var(--low); }

        .finding-detail { color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; }
        .finding-remediation {
            margin-top: 10px;
            padding: 10px;
            background: #0d1117;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #a8d8a8;
        }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th { background: var(--bg-card); color: var(--accent-blue); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: var(--bg-card); }

        /* ── Code Blocks ── */
        pre, code {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a8d8a8;
        }
        pre { padding: 12px 16px; overflow-x: auto; }

        /* ── Footer ── */
        .footer {
            border-top: 1px solid var(--border);
            padding-top: 24px;
            margin-top: 60px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ── Print ── */
        @media print {
            body { background: white; color: black; }
            .header { border-color: #0070f3; }
            pre, code { background: #f0f0f0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🛡️ Attack Surface Report <span class="risk-badge risk-{{risk_level}}">Risk: {{risk_score}}/100</span></h1>
        <div class="meta">
            Target: <span class="target">{{target}}</span> &nbsp;|&nbsp;
            Generated: {{generated_at}} &nbsp;|&nbsp;
            Agent: ReconAI Multi-Agent System
        </div>
    </div>

    {{content}}

    <div class="footer">
        <p>Generated by ReconAI — Multi-Agent Attack Surface Scanner | For authorized use only</p>
        <p>{{generated_at}}</p>
    </div>
</div>
</body>
</html>
